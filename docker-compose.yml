services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pinposiplus-v2-backend
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_DATABASE=pinposiplus
      - DB_USERNAME=pinposiplus
      - DB_PASSWORD=secret

  db:
    image: mysql:8.4
    container_name: pinposiplus-v2-db
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=pinposiplus
      - MYSQL_USER=pinposiplus
      - MYSQL_PASSWORD=secret

volumes:
  db_data:
