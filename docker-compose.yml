services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: pinposiplus-v2-backend
        volumes:
            - .:/var/www/html
        expose:
            - "8000"
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: pinposiplus-v2-nginx
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    db:
        image: mysql:8.4
        container_name: pinposiplus-v2-db
        volumes:
            - db_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
        ports:
            - "3307:3306"

volumes:
    db_data:
